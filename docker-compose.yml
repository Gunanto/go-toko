services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-pos_app
    depends_on:
      - postgres
      - redis
    ports:
      - "${APP_HOST_PORT:-8083}:8082"
    environment:
      APP_NAME: "go-pos"
      APP_ENV: "production"
      HTTP_URL: "0.0.0.0"
      HTTP_PORT: "8082"
      HTTP_ALLOWED_ORIGINS: "http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:5175,http://localhost:5173,http://localhost:5174,http://localhost:5175"
      DB_CONNECTION: "postgres"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "gopos"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      TOKEN_DURATION: "15m"
      TOKEN_KEY_HEX: "${TOKEN_KEY_HEX}"
      STORE_GOOGLE_CLIENT_ID: "${STORE_GOOGLE_CLIENT_ID}"
      STORE_GOOGLE_CLIENT_SECRET: "${STORE_GOOGLE_CLIENT_SECRET}"
      STORE_GOOGLE_REDIRECT_URL: "${STORE_GOOGLE_REDIRECT_URL}"
      STORE_GOOGLE_FRONTEND_REDIRECT: "${STORE_GOOGLE_FRONTEND_REDIRECT}"

  app-dev:
    image: golang:1.23-alpine
    container_name: go-pos_app_dev
    depends_on:
      - postgres
      - redis
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "${APP_DEV_HOST_PORT:-8082}:8082"
    environment:
      APP_NAME: "go-pos"
      APP_ENV: "development"
      HTTP_URL: "0.0.0.0"
      HTTP_PORT: "8082"
      HTTP_ALLOWED_ORIGINS: "http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:5175,http://localhost:5173,http://localhost:5174,http://localhost:5175"
      DB_CONNECTION: "postgres"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "gopos"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      TOKEN_DURATION: "15m"
      TOKEN_KEY_HEX: "${TOKEN_KEY_HEX}"
      STORE_GOOGLE_CLIENT_ID: "${STORE_GOOGLE_CLIENT_ID}"
      STORE_GOOGLE_CLIENT_SECRET: "${STORE_GOOGLE_CLIENT_SECRET}"
      STORE_GOOGLE_REDIRECT_URL: "${STORE_GOOGLE_REDIRECT_URL}"
      STORE_GOOGLE_FRONTEND_REDIRECT: "${STORE_GOOGLE_FRONTEND_REDIRECT}"
    command: >
      sh -c "go run ./cmd/http"

  web:
    image: node:20-alpine
    container_name: go-pos_web
    depends_on:
      - app-dev
    working_dir: /app
    volumes:
      - ./web:/app
    ports:
      - "${WEB_HOST_PORT:-5175}:5173"
    environment:
      VITE_API_BASE: "/v1"
      VITE_PROXY_TARGET: "http://app-dev:8082"
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  postgres:
    image: postgres:16-alpine
    container_name: go-pos_postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_NAME} -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: go-pos_redis
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres:
    driver: local
  redis:
    driver: local
